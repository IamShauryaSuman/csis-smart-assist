app = "csis-smart-assist"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.fly"

[http_service]
  internal_port = 8000
  force_https = true

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

[env]
  OLLAMA_BASE_URL = "http://localhost:11434"
  OLLAMA_MODEL = "gemma2:2b"
  EMBEDDING_MODEL = "sentence-transformers/all-MiniLM-L6-v2"