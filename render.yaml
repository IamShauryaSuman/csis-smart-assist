services:
  - type: web
    name: csis-smart-assist-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: |
      pip install -r requirements.txt
    startCommand: |
      uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: ORT_LOG_LEVEL
        value: "3"
      - key: TOKENIZERS_PARALLELISM
        value: "false"
      - key: ANONYMIZED_TELEMETRY
        value: "false"
