services:
  - type: web
    name: csis-smart-assist-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      curl -fsSL https://ollama.com/install.sh | sh
      ollama pull gemma2:2b
    startCommand: |
      ollama serve &
      sleep 5
      uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: OLLAMA_BASE_URL
        value: "http://localhost:11434"
      - key: OLLAMA_MODEL
        value: "gemma2:2b"
      - key: EMBEDDING_MODEL
        value: "sentence-transformers/all-MiniLM-L6-v2"
      - key: ORT_LOG_LEVEL
        value: "3"
      - key: TOKENIZERS_PARALLELISM
        value: "false"
      - key: ANONYMIZED_TELEMETRY
        value: "false"
